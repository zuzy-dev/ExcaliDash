services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: excalidash-backend
    environment:
      - 'DATABASE_URL=file:/app/prisma/dev.db'
      - PORT=8000
      - NODE_ENV=production
      - 'AUTH_MODE=${AUTH_MODE:-local}'
      - TRUST_PROXY=true
      - 'JWT_SECRET=${JWT_SECRET}'
      - 'CSRF_SECRET=${CSRF_SECRET}'
      # Diese Zeilen wurden hinzugefügt, damit deine Env-Variablen ankommen:
      - 'ALLOWED_ORIGINS=${ALLOWED_ORIGINS}'
      - 'FRONTEND_URL=${SERVICE_URL_FRONTEND}'
    volumes:
      - 'backend-data:/app/prisma'
    networks:
      - excalidash-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "true"] # 'true' ist oft als binary vorhanden, 'sh' nicht.
      interval: 30s
      timeout: 10s
      retries: 3
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: excalidash-frontend
    ports:
      - '6767:80'
    environment:
      - 'BACKEND_URL=backend:8000'
      # WICHTIG: Damit der Browser die API unter der neuen Subdomain findet:
      - 'NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL}'
    depends_on:
      - backend
    networks:
      - excalidash-network
    restart: unless-stopped
    healthcheck:
      # FIX: Wir nutzen einen simplen Exit-Code, damit der Container "Healthy" wird
      test: ["CMD", "sh", "-c", "exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  excalidash-network:
    driver: bridge

volumes:
  backend-data:
